dbs:
  - path: /rails/storage/production.sqlite3
    replicas:
      - url: s3://${LITESTREAM_REPLICA_BUCKET}/fizzbuzz_app/production
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}

  - path: /rails/storage/production_queue.sqlite3
    replicas:
      - url: s3://${LITESTREAM_REPLICA_BUCKET}/fizzbuzz_app/production_queue
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}

  - path: /rails/storage/production_cache.sqlite3
    replicas:
      - url: s3://${LITESTREAM_REPLICA_BUCKET}/fizzbuzz_app/production_cache
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}

  - path: /rails/storage/production_cable.sqlite3
    replicas:
      - url: s3://${LITESTREAM_REPLICA_BUCKET}/fizzbuzz_app/production_cable
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}
