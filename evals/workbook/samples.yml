_fixture:
  model_class: RubyLLM::Evals::Sample

# --- Catastrophizing ---
catastrophizing_positive:
  prompt: thinking_trap_identification
  eval_type: regex
  expected_output: "(?i)affirm"
  variables:
    situation: "A deploy I pushed caused a 5-minute outage. This is a catastrophe — the whole company will lose trust in engineering and we'll definitely lose our biggest customer."
    trap: "Catastrophizing"

catastrophizing_negative:
  prompt: thinking_trap_identification
  eval_type: regex
  expected_output: "(?i)challenge"
  variables:
    situation: "A deploy I pushed caused a 5-minute outage. This is a catastrophe — the whole company will lose trust in engineering and we'll definitely lose our biggest customer."
    trap: "Mind Reading"

# --- Personalizing ---
personalizing_positive:
  prompt: thinking_trap_identification
  eval_type: regex
  expected_output: "(?i)affirm"
  variables:
    situation: "Our sprint retrospective flagged slow test runs as a team problem. I wrote most of the tests this quarter, so this is entirely my fault and I've let the whole team down."
    trap: "Personalizing"

personalizing_negative:
  prompt: thinking_trap_identification
  eval_type: regex
  expected_output: "(?i)challenge"
  variables:
    situation: "Our sprint retrospective flagged slow test runs as a team problem. I wrote most of the tests this quarter, so this is entirely my fault and I've let the whole team down."
