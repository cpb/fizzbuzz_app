_fixture:
  model_class: RubyLLM::Evals::Prompt

fizzbuzz_basic:
  name: "FizzBuzz Basic"
  slug: "fizzbuzz-basic"
  provider: "ollama"
  model: "llama3.2"
  message: "Divisible by 3 -> Fizz, by 5 -> Buzz, by both -> FizzBuzz, otherwise the number. What is the FizzBuzz output for {{number}}? Answer with one word only."

yoda_fizzbuzz:
  name: "Yoda FizzBuzz"
  slug: "yoda-fizzbuzz"
  provider: "ollama"
  model: "llama3.2"
  instructions: "Speak like Yoda, you must. Play FizzBuzz you must: for a number divisible by 3 but not 5, say Fizz; by 5 but not 3, say Buzz; by both 3 and 5, say FizzBuzz; otherwise say the number. One word only, your answer must be."
  message: "{{number}}"

fizzbuzz_eval:
  name: "FizzBuzz Eval"
  slug: "fizzbuzz-eval"
  provider: "ollama"
  model: "llama3.2"
  instructions: "Evaluate FizzBuzz for the given number. Return exactly one word: 'FizzBuzz' if divisible by both 3 and 5, 'Fizz' if divisible by 3 only, 'Buzz' if divisible by 5 only, or the number itself otherwise."
  message: "{{number}}"

fizzbuzz_clean:
  name: "FizzBuzz Clean"
  slug: "fizzbuzz-clean"
  provider: "ollama"
  model: "llama3.2"
  instructions: 'Return ONLY valid JSON with a single key: {"result": "Fizz"}. Rules: divisible by 3 -> Fizz, by 5 -> Buzz, by both -> FizzBuzz, otherwise the number as a string.'
  message: "{{number}}"
